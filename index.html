<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* CSS TETAP SAMA SEPERTI SEBELUMNYA */
        :root {
            --bg-primary: #0c0c14;
            --bg-card: rgba(20, 20, 31, 0.75);
            --border: rgba(251, 191, 36, 0.25);
            --accent: #fbbf24;
            --accent-glow: rgba(251, 191, 36, 0.35);
            --text-primary: #f5f5f5;
            --text-secondary: #9ca3af;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }

        .bg-image {
            position: fixed; 
            inset: 0; 
            z-index: -2;
            background-image: url('https://i.ibb.co/WWSynmGS/vaultkey-bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .bg-overlay {
            position: fixed; 
            inset: 0; 
            z-index: -1;
            background: rgba(12, 12, 20, 0.88);
            backdrop-filter: blur(3px);
        }

        .floating-orb {
            position: fixed; border-radius: 50%; filter: blur(100px);
            animation: floatOrb 25s ease-in-out infinite; pointer-events: none; opacity: 0.5;
        }
        .orb-1 { width: 500px; height: 500px; background: rgba(251, 191, 36, 0.08); top: -200px; left: 50%; transform: translateX(-50%); }
        .orb-2 { width: 300px; height: 300px; background: rgba(234, 88, 12, 0.06); bottom: -100px; right: -100px; animation-delay: -12s; }

        @keyframes floatOrb { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.1); } }

        .glass-card {
            background: var(--bg-card); backdrop-filter: blur(24px); border: 1px solid var(--border);
            border-radius: 20px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover { border-color: rgba(251, 191, 36, 0.45); box-shadow: 0 0 40px rgba(251, 191, 36, 0.1); }

        .input-field {
            background: rgba(10, 10, 18, 0.9); border: 1px solid var(--border); border-radius: 14px;
            padding: 16px 20px; color: var(--text-primary); font-family: 'JetBrains Mono', monospace;
            font-size: 14px; transition: all 0.3s ease; width: 100%;
        }
        .input-field:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 25px var(--accent-glow); }
        .input-field::placeholder { color: var(--text-secondary); font-family: 'Space Grotesk', sans-serif; }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #ea580c 100%); color: var(--bg-primary);
            font-weight: 700; padding: 16px 32px; border-radius: 14px; border: none; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-size: 15px; letter-spacing: 0.5px;
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 40px var(--accent-glow); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .btn-secondary {
            background: transparent; border: 1px solid var(--border); color: var(--text-primary);
            padding: 14px 24px; border-radius: 14px; cursor: pointer; transition: all 0.3s ease; font-weight: 500;
        }
        .btn-secondary:hover { background: rgba(251, 191, 36, 0.1); border-color: var(--accent); }

        .btn-icon {
            width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border);
            background: rgba(10, 10, 18, 0.7); color: var(--text-secondary); cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.3s ease;
        }
        .btn-icon:hover { background: rgba(251, 191, 36, 0.15); border-color: var(--accent); color: var(--accent); }

        .btn-eye {
            background: none; border: none; cursor: pointer; color: var(--text-secondary);
            padding: 4px; transition: color 0.2s; display: flex; align-items: center;
        }
        .btn-eye:hover { color: var(--accent); }

        .logo-wrapper { position: relative; cursor: pointer; }
        .logo-wrapper:hover .logo-edit-overlay { opacity: 1; }
        .logo-edit-overlay {
            position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .logo-container { animation: glowPulse 4s ease-in-out infinite; }
        @keyframes glowPulse { 0%, 100% { filter: drop-shadow(0 0 20px var(--accent-glow)); } 50% { filter: drop-shadow(0 0 40px var(--accent-glow)); } }

        .logo-img { width: 70px; height: 70px; border-radius: 18px; object-fit: cover; border: 2px solid var(--border); }

        .password-item { animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; opacity: 0; transform: translateY(30px); }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            opacity: 0; visibility: hidden; transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { transform: scale(0.92) translateY(30px); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); }

        .stat-number {
            font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 2rem;
            background: linear-gradient(135deg, var(--accent) 0%, #ea580c 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        .password-dots { letter-spacing: 3px; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(120px);
            padding: 16px 28px; border-radius: 14px; background: var(--bg-card); border: 1px solid var(--border);
            backdrop-filter: blur(20px); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }

        /* AUTH PAGES */
        .auth-container {
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .auth-card {
            width: 100%; max-width: 420px;
            animation: authSlideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes authSlideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-logo {
            width: 90px; height: 90px; border-radius: 24px; object-fit: cover;
            border: 3px solid var(--border); 
            animation: logoFloat 3s ease-in-out infinite;
        }
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .password-strength {
            height: 4px; border-radius: 2px; background: rgba(255,255,255,0.1);
            margin-top: 8px; overflow: hidden;
        }
        .password-strength-bar {
            height: 100%; transition: all 0.3s ease; border-radius: 2px;
        }
        .strength-weak { width: 33%; background: #ef4444; }
        .strength-medium { width: 66%; background: #f59e0b; }
        .strength-strong { width: 100%; background: #22c55e; }

        .auth-tab {
            padding: 12px 24px; border-radius: 10px; cursor: pointer;
            transition: all 0.3s ease; font-weight: 500; color: var(--text-secondary);
        }
        .auth-tab.active { background: rgba(251, 191, 36, 0.15); color: var(--accent); }
        .auth-tab:hover:not(.active) { color: var(--text-primary); }

        .user-badge {
            background: rgba(251, 191, 36, 0.1); border: 1px solid var(--border);
            padding: 6px 14px; border-radius: 20px; font-size: 13px;
            display: flex; align-items: center; gap: 6px;
        }

        .lock-icon {
            animation: lockPulse 2s ease-in-out infinite;
        }
        @keyframes lockPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @media (max-width: 640px) {
            .glass-card { border-radius: 16px; }
            .logo-img { width: 55px; height: 55px; }
            .stat-number { font-size: 1.5rem; }
            .btn-icon { width: 36px; height: 36px; }
            .auth-logo { width: 70px; height: 70px; }
        }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>
    
    <div class="floating-orb orb-1"></div>
    <div class="floating-orb orb-2"></div>

    <!-- AUTH PAGE -->
    <div id="authPage" class="auth-container">
        <div class="auth-card">
            <div class="glass-card p-8 md:p-10">
                <!-- Logo & Title -->
                <div class="text-center mb-8">
                    <div class="inline-block mb-5">
                        <img src="https://i.imgur.com/2Rb3NSj.jpeg" alt="Logo" class="auth-logo">
                    </div>
                    <h1 class="text-2xl md:text-3xl font-bold tracking-tight">ROZI JEIGER</h1>
                    <p class="text-slate-400 mt-2 text-sm">Password Manager Aman</p>
                </div>

                <!-- Tabs -->
                <div class="flex bg-slate-800/30 rounded-xl p-1.5 mb-7">
                    <button id="loginTab" onclick="switchAuthTab('login')" class="auth-tab active flex-1">Masuk</button>
                    <button id="registerTab" onclick="switchAuthTab('register')" class="auth-tab flex-1">Daftar</button>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="space-y-5">
                    <div>
                        <label class="block text-sm text-slate-400 mb-2 font-medium">Username</label>
                        <div class="relative">
                            <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            <input type="text" id="loginUsername" class="input-field pl-12" placeholder="Masukkan username" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-2 font-medium">Password</label>
                        <div class="relative">
                            <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <input type="password" id="loginPassword" class="input-field pl-12 pr-12" placeholder="Masukkan password" required>
                            <button type="button" onclick="toggleAuthPassword('login')" class="absolute right-4 top-1/2 -translate-y-1/2 btn-eye">
                                <svg id="loginEyeOpen" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                <svg id="loginEyeClosed" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                    <line x1="1" y1="1" x2="23" y2="23"></line>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary w-full mt-6">
                        <span class="flex items-center justify-center gap-2">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                                <polyline points="10 17 15 12 10 7"></polyline>
                                <line x1="15" y1="12" x2="3" y2="12"></line>
                            </svg>
                            Masuk
                        </span>
                    </button>
                </form>

                <!-- Register Form -->
                <form id="registerForm" class="space-y-5 hidden">
                    <div>
                        <label class="block text-sm text-slate-400 mb-2 font-medium">Username</label>
                        <div class="relative">
                            <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            <input type="text" id="regUsername" class="input-field pl-12" placeholder="Buat username (min. 4 karakter)" required minlength="4">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-2 font-medium">Password</label>
                        <div class="relative">
                            <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <input type="password" id="regPassword" class="input-field pl-12 pr-12" placeholder="Buat password (min. 6 karakter)" required minlength="6" oninput="checkPasswordStrength(this.value)">
                            <button type="button" onclick="toggleAuthPassword('reg')" class="absolute right-4 top-1/2 -translate-y-1/2 btn-eye">
                                <svg id="regEyeOpen" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                <svg id="regEyeClosed" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                    <line x1="1" y1="1" x2="23" y2="23"></line>
                                </svg>
                            </button>
                        </div>
                        <div class="password-strength">
                            <div id="strengthBar" class="password-strength-bar"></div>
                        </div>
                        <p id="strengthText" class="text-xs mt-1.5 text-slate-500"></p>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-2 font-medium">Konfirmasi Password</label>
                        <div class="relative">
                            <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                            <input type="password" id="regConfirmPassword" class="input-field pl-12" placeholder="Ulangi password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary w-full mt-6">
                        <span class="flex items-center justify-center gap-2">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="8.5" cy="7" r="4"></circle>
                                <line x1="20" y1="8" x2="20" y2="14"></line>
                                <line x1="23" y1="11" x2="17" y2="11"></line>
                            </svg>
                            Daftar Akun
                        </span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="hidden min-h-screen p-4 md:p-8">
        <!-- Header -->
        <header class="max-w-3xl mx-auto mb-10">
            <div class="flex flex-col sm:flex-row items-center justify-between gap-5">
                <div class="flex items-center gap-5">
                    <div class="logo-container">
                        <div class="logo-wrapper" onclick="changeLogo()" title="Klik untuk ganti logo">
                            <img id="logoImg" src="https://i.imgur.com/2Rb3NSj.jpeg" alt="Logo" class="logo-img">
                            <div class="logo-edit-overlay">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                </svg>
                            </div>
                        </div>
                    </div>
                    <div>
                        <h1 class="text-2xl md:text-3xl font-bold tracking-tight">ROZI JEIGER</h1>
                        <p class="text-sm text-slate-400 mt-0.5">Simpan data login dengan aman</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="user-badge">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <span id="currentUserDisplay">User</span>
                    </div>
                    <button onclick="openModal()" class="btn-primary flex items-center gap-3">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        <span class="hidden sm:inline">Tambah Data</span>
                    </button>
                    <button onclick="logout()" class="btn-icon" title="Keluar">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Stats -->
        <div class="max-w-3xl mx-auto mb-8">
            <div class="glass-card p-6 text-center">
                <div class="stat-number" id="totalCount">0</div>
                <div class="text-xs text-slate-400 uppercase tracking-widest mt-1">Data Tersimpan</div>
            </div>
        </div>

        <!-- Search -->
        <div class="max-w-3xl mx-auto mb-6">
            <div class="relative">
                <svg class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" class="input-field pl-14" placeholder="Cari data login...">
            </div>
        </div>

        <!-- Password List -->
        <div class="max-w-3xl mx-auto">
            <div id="passwordList" class="space-y-4"></div>
            <div id="emptyState" class="glass-card p-14 text-center hidden">
                <div class="w-24 h-24 mx-auto mb-6 rounded-2xl bg-gradient-to-br from-slate-700/50 to-slate-800/50 flex items-center justify-center border border-slate-600/30">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-slate-500">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <h3 class="text-xl font-semibold mb-2">Belum Ada Data</h3>
                <p class="text-slate-400 mb-6">Klik tombol "Tambah Data" untuk mulai menyimpan</p>
                <button onclick="openModal()" class="btn-primary">Tambah Data Login</button>
            </div>
        </div>
    </div>

    <!-- Modal Add/Edit -->
    <div id="modal" class="modal-overlay">
        <div class="modal-content w-full max-w-md mx-4">
            <div class="glass-card p-7 md:p-9">
                <div class="flex items-center justify-between mb-7">
                    <h2 id="modalTitle" class="text-xl font-bold">Tambah Data Baru</h2>
                    <button onclick="closeModal()" class="btn-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <form id="passwordForm" class="space-y-5">
                    <input type="hidden" id="editId">
                    <div>
                        <label class="block text-sm text-slate-400 mb-2 font-medium">Judul</label>
                        <input type="text" id="titleInput" class="input-field" placeholder="Contoh: Google Drive, Admin Panel" required>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-2 font-medium">Username</label>
                        <input type="text" id="usernameInput" class="input-field" placeholder="Masukkan username atau email" required>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-2 font-medium">Password</label>
                        <div class="relative">
                            <input type="password" id="passwordInput" class="input-field pr-14" placeholder="Masukkan password" required>
                            <button type="button" onclick="toggleModalPassword()" class="absolute right-3 top-1/2 -translate-y-1/2 btn-eye">
                                <svg id="modalEyeOpen" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                <svg id="modalEyeClosed" class="hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                    <line x1="1" y1="1" x2="23" y2="23"></line>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="flex gap-3 pt-3">
                        <button type="button" onclick="closeModal()" class="btn-secondary flex-1">Batal</button>
                        <button type="submit" class="btn-primary flex-1">Simpan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">
        <div class="flex items-center gap-3">
            <div id="toastIcon"></div>
            <span id="toastMessage" class="font-medium"></span>
        </div>
    </div>

    <script>
        // ========== GLOBAL STATE ==========
        let passwords = [];
        let currentUser = null;

        // ========== INITIALIZATION ==========
        document.addEventListener('DOMContentLoaded', () => {
            checkSession();
            loadLogo();
        });

        // ========== AUTH FUNCTIONS ==========
        function switchAuthTab(tab) {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');

            if (tab === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
            } else {
                loginTab.classList.remove('active');
                registerTab.classList.add('active');
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
            }
        }

        function toggleAuthPassword(type) {
            const input = document.getElementById(type === 'login' ? 'loginPassword' : 'regPassword');
            const eyeOpen = document.getElementById(type === 'login' ? 'loginEyeOpen' : 'regEyeOpen');
            const eyeClosed = document.getElementById(type === 'login' ? 'loginEyeClosed' : 'regEyeClosed');
            
            if (input.type === 'password') {
                input.type = 'text';
                eyeOpen.classList.add('hidden');
                eyeClosed.classList.remove('hidden');
            } else {
                input.type = 'password';
                eyeOpen.classList.remove('hidden');
                eyeClosed.classList.add('hidden');
            }
        }

        function checkPasswordStrength(password) {
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');
            
            if (password.length === 0) {
                bar.className = 'password-strength-bar';
                text.textContent = '';
                return;
            }

            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            if (strength <= 2) {
                bar.className = 'password-strength-bar strength-weak';
                text.textContent = 'Lemah';
                text.style.color = '#ef4444';
            } else if (strength <= 3) {
                bar.className = 'password-strength-bar strength-medium';
                text.textContent = 'Sedang';
                text.style.color = '#f59e0b';
            } else {
                bar.className = 'password-strength-bar strength-strong';
                text.textContent = 'Kuat';
                text.style.color = '#22c55e';
            }
        }

        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return hash.toString(16);
        }

        // Login Form Handler
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value.trim().toLowerCase();
            const password = document.getElementById('loginPassword').value;
            
            const users = JSON.parse(localStorage.getItem('vaultkey_users') || '{}');
            
            if (!users[username]) {
                showToast('Username tidak ditemukan', 'error');
                return;
            }

            if (users[username].password !== simpleHash(password)) {
                showToast('Password salah', 'error');
                return;
            }

            // Login success
            currentUser = username;
            // PERUBAHAN: Gunakan localStorage agar login tersimpan permanen
            localStorage.setItem('vaultkey_session', username);
            document.getElementById('currentUserDisplay').textContent = username;
            
            showToast('Berhasil masuk', 'success');
            showMainApp();
        });

        // Register Form Handler
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('regUsername').value.trim().toLowerCase();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            if (username.length < 4) {
                showToast('Username minimal 4 karakter', 'error');
                return;
            }

            if (password.length < 6) {
                showToast('Password minimal 6 karakter', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showToast('Password tidak cocok', 'error');
                return;
            }

            const users = JSON.parse(localStorage.getItem('vaultkey_users') || '{}');
            
            if (users[username]) {
                showToast('Username sudah digunakan', 'error');
                return;
            }

            // Create new user
            users[username] = {
                password: simpleHash(password),
                createdAt: new Date().toISOString()
            };
            
            localStorage.setItem('vaultkey_users', JSON.stringify(users));
            
            // Auto login after register
            currentUser = username;
            // PERUBAHAN: Gunakan localStorage
            localStorage.setItem('vaultkey_session', username);
            document.getElementById('currentUserDisplay').textContent = username;
            
            showToast('Akun berhasil dibuat', 'success');
            showMainApp();
        });

        function checkSession() {
            // PERUBAHAN: Cek localStorage, bukan sessionStorage
            const session = localStorage.getItem('vaultkey_session');
            if (session) {
                const users = JSON.parse(localStorage.getItem('vaultkey_users') || '{}');
                if (users[session]) {
                    currentUser = session;
                    document.getElementById('currentUserDisplay').textContent = session;
                    showMainApp();
                    return;
                }
            }
            showAuthPage();
        }

        function showAuthPage() {
            document.getElementById('authPage').classList.remove('hidden');
            document.getElementById('mainApp').classList.add('hidden');
        }

        function showMainApp() {
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            loadData();
            renderPasswords();
            updateStats();
        }

        function logout() {
            if (confirm('Yakin ingin keluar?')) {
                // PERUBAHAN: Hapus dari localStorage
                localStorage.removeItem('vaultkey_session');
                currentUser = null;
                passwords = [];
                
                // Reset forms
                document.getElementById('loginForm').reset();
                document.getElementById('registerForm').reset();
                document.getElementById('strengthBar').className = 'password-strength-bar';
                document.getElementById('strengthText').textContent = '';
                
                showAuthPage();
                showToast('Berhasil keluar', 'success');
            }
        }

        // ========== LOGO FEATURE ==========
        function loadLogo() {
            const savedLogo = localStorage.getItem('vaultkey_custom_logo');
            if (savedLogo) {
                document.getElementById('logoImg').src = savedLogo;
            }
        }

        function changeLogo() {
            const currentSrc = document.getElementById('logoImg').src;
            const newUrl = prompt('Masukkan URL gambar logo baru:', currentSrc);
            
            if (newUrl && newUrl.trim() !== '') {
                localStorage.setItem('vaultkey_custom_logo', newUrl.trim());
                document.getElementById('logoImg').src = newUrl.trim();
                showToast('Logo berhasil diganti', 'success');
            }
        }

        // ========== DATA FUNCTIONS ==========
        const encrypt = (text) => btoa(encodeURIComponent(text));
        const decrypt = (encoded) => { try { return decodeURIComponent(atob(encoded)); } catch { return encoded; } };

        function loadData() {
            if (!currentUser) return;
            
            const key = `vaultkey_passwords_${currentUser}`;
            const saved = localStorage.getItem(key);
            
            if (saved) {
                try {
                    passwords = JSON.parse(saved).map(item => ({ ...item, password: decrypt(item.password) }));
                } catch { passwords = []; }
            } else {
                passwords = [];
            }
        }

        function saveData() {
            if (!currentUser) return;
            
            const key = `vaultkey_passwords_${currentUser}`;
            const encrypted = passwords.map(item => ({ ...item, password: encrypt(item.password) }));
            localStorage.setItem(key, JSON.stringify(encrypted));
        }

        function renderPasswords(search = '') {
            const container = document.getElementById('passwordList');
            const emptyState = document.getElementById('emptyState');
            
            let filtered = passwords;
            if (search) {
                const s = search.toLowerCase();
                filtered = filtered.filter(item => 
                    item.title.toLowerCase().includes(s) || 
                    item.username.toLowerCase().includes(s)
                );
            }

            if (filtered.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            
            container.innerHTML = filtered.map((item, index) => `
                <div class="password-item glass-card p-5" style="animation-delay: ${index * 0.08}s">
                    <div class="flex items-start gap-4">
                        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-amber-500/20 to-orange-600/20 flex items-center justify-center flex-shrink-0 border border-amber-500/20 mt-1">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                            </svg>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h3 class="font-semibold text-lg">${escapeHtml(item.title)}</h3>
                            <p class="text-sm text-slate-400 font-mono mt-0.5">${escapeHtml(item.username)}</p>
                            
                            <div class="flex items-center gap-2 mt-1">
                                <span id="pwd-text-${item.id}" class="text-sm text-slate-500 font-mono password-dots">••••••••</span>
                                <button onclick="toggleListPassword('${item.id}')" class="btn-eye" title="Lihat Password">
                                    <svg id="eye-open-${item.id}" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                    <svg id="eye-closed-${item.id}" class="hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                        <line x1="1" y1="1" x2="23" y2="23"></line>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-2 flex-shrink-0">
                            <button onclick="copyToClipboard('${escapeHtml(item.username)}', 'Username')" class="btn-icon" title="Copy Username">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                </svg>
                            </button>
                            <button onclick="copyToClipboard('${escapeHtml(item.password)}', 'Password')" class="btn-icon" title="Copy Password">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                </svg>
                            </button>
                            <button onclick="editPassword('${item.id}')" class="btn-icon" title="Edit">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                </svg>
                            </button>
                            <button onclick="deletePassword('${item.id}')" class="btn-icon" title="Hapus" style="color: #ef4444;">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <input type="hidden" id="pwd-value-${item.id}" value="${escapeHtml(item.password)}">
                </div>
            `).join('');
        }

        function toggleListPassword(id) {
            const textEl = document.getElementById(`pwd-text-${id}`);
            const eyeOpen = document.getElementById(`eye-open-${id}`);
            const eyeClosed = document.getElementById(`eye-closed-${id}`);
            const valueEl = document.getElementById(`pwd-value-${id}`);
            
            if (textEl.classList.contains('password-dots')) {
                textEl.textContent = valueEl.value;
                textEl.classList.remove('password-dots');
                eyeOpen.classList.add('hidden');
                eyeClosed.classList.remove('hidden');
            } else {
                textEl.textContent = '••••••••';
                textEl.classList.add('password-dots');
                eyeOpen.classList.remove('hidden');
                eyeClosed.classList.add('hidden');
            }
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = passwords.length;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== MODAL FUNCTIONS ==========
        function openModal() {
            document.getElementById('modal').classList.add('active');
            document.getElementById('modalTitle').textContent = 'Tambah Data Baru';
            document.getElementById('passwordForm').reset();
            document.getElementById('editId').value = '';
            resetModalEye();
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function toggleModalPassword() {
            const input = document.getElementById('passwordInput');
            const eyeOpen = document.getElementById('modalEyeOpen');
            const eyeClosed = document.getElementById('modalEyeClosed');
            
            if (input.type === 'password') {
                input.type = 'text';
                eyeOpen.classList.add('hidden');
                eyeClosed.classList.remove('hidden');
            } else {
                input.type = 'password';
                eyeOpen.classList.remove('hidden');
                eyeClosed.classList.add('hidden');
            }
        }

        function resetModalEye() {
            document.getElementById('passwordInput').type = 'password';
            document.getElementById('modalEyeOpen').classList.remove('hidden');
            document.getElementById('modalEyeClosed').classList.add('hidden');
        }

        // Password Form Handler
        document.getElementById('passwordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const editId = document.getElementById('editId').value;
            const data = {
                id: editId || Date.now().toString(),
                title: document.getElementById('titleInput').value.trim(),
                username: document.getElementById('usernameInput').value.trim(),
                password: document.getElementById('passwordInput').value,
                createdAt: editId ? passwords.find(p => p.id === editId)?.createdAt : new Date().toISOString()
            };

            if (editId) {
                const index = passwords.findIndex(p => p.id === editId);
                if (index !== -1) {
                    passwords[index] = data;
                    showToast('Data berhasil diperbarui', 'success');
                }
            } else {
                passwords.push(data);
                showToast('Data berhasil disimpan', 'success');
            }

            saveData();
            renderPasswords(document.getElementById('searchInput').value);
            updateStats();
            closeModal();
        });

        function editPassword(id) {
            const item = passwords.find(p => p.id === id);
            if (!item) return;
            
            document.getElementById('editId').value = item.id;
            document.getElementById('titleInput').value = item.title;
            document.getElementById('usernameInput').value = item.username;
            document.getElementById('passwordInput').value = item.password;
            document.getElementById('modalTitle').textContent = 'Edit Data';
            resetModalEye();
            document.getElementById('modal').classList.add('active');
        }

        function deletePassword(id) {
            if (confirm('Hapus data ini?')) {
                passwords = passwords.filter(p => p.id !== id);
                saveData();
                renderPasswords(document.getElementById('searchInput').value);
                updateStats();
                showToast('Data berhasil dihapus', 'success');
            }
        }

        function copyToClipboard(text, label) {
            navigator.clipboard.writeText(text).then(() => {
                showToast(`${label} berhasil disalin`, 'success');
            }).catch(() => {
                showToast('Gagal menyalin', 'error');
            });
        }

        // ========== TOAST ==========
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const toastIcon = document.getElementById('toastIcon');
            
            toast.className = `toast ${type}`;
            toastMessage.textContent = message;
            
            if (type === 'success') {
                toastIcon.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
            } else {
                toastIcon.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>';
            }
            
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ========== EVENT LISTENERS ==========
        document.getElementById('searchInput').addEventListener('input', function(e) {
            renderPasswords(e.target.value);
        });

        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
